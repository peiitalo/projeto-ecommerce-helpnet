services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres-mobile
    restart: unless-stopped
    environment:
      POSTGRES_DB: projeto_ecommerce_prod
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_secure_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_mobile_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d projeto_ecommerce_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend-mobile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_secure_2024@postgres:5432/projeto_ecommerce_prod
      PORT: 3001
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend-mobile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://192.168.0.104:3001
    ports:
      - "0.0.0.0:5173:5173"
    depends_on:
      - backend
    networks:
      - ecommerce-network

volumes:
  postgres_mobile_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge